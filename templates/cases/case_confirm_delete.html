{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="card">
      <div class="card-body">
        <h5 class="mb-3">Eliminar caso</h5>
        <p class="mb-3">
          ¿Seguro que quieres eliminar este caso?
          {% if case.cic %}<br><strong>CIC:</strong> {{ case.cic }}{% endif %}
          <br><strong>Diagnóstico:</strong> {{ case.diagnostico_inicial|default:"(sin texto)" }}
        </p>

        <form method="post" class="d-flex gap-2 justify-content-end">
          {% csrf_token %}
          <a class="btn btn-outline-secondary" href="{% url 'case_edit' case.id %}">Cancelar</a>
          <button class="btn btn-danger" type="submit">Sí, eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
