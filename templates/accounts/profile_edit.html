{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="card">
      <div class="card-body">
        <h5 class="mb-3">Mi perfil</h5>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Hospital por defecto</label>
            {{ form.hospital_default }}
            <div class="form-text">Se usará automáticamente al crear un caso nuevo.</div>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <a class="btn btn-outline-secondary" href="{% url 'case_list' %}">Cancelar</a>
            <button class="btn btn-primary" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
